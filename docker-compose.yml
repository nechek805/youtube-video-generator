services:
  migrate:
    build: .
    profiles: ["tools"]
    volumes:
      - .:/app
      - app_venv:/app/.venv
    user: "1000:1000"
    environment:
      HOME: /tmp
      UV_CACHE_DIR: /tmp/uv-cache
      UV_PROJECT_ENVIRONMENT: /tmp/.venv

      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      MOCK_VIDEO_CDN_BASE: ${MOCK_VIDEO_CDN_BASE:-https://mock-cdn.example.com/videos}
    depends_on:
      postgres:
        condition: service_healthy
    command: uv run alembic upgrade head

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - app_venv:/app/.venv
    user: "1000:1000"
    restart: unless-stopped
    environment:
      HOME: /tmp
      UV_CACHE_DIR: /tmp/uv-cache
      UV_PROJECT_ENVIRONMENT: /tmp/.venv

      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2

      REDIS_URL: redis://redis:6379/0

      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      MOCK_VIDEO_CDN_BASE: ${MOCK_VIDEO_CDN_BASE:-https://mock-cdn.example.com/videos}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    volumes:
      - .:/app
      - app_venv:/app/.venv
    user: "1000:1000"
    restart: unless-stopped
    environment:
      HOME: /tmp
      UV_CACHE_DIR: /tmp/uv-cache
      UV_PROJECT_ENVIRONMENT: /tmp/.venv

      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2

      REDIS_URL: redis://redis:6379/0

      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      MOCK_VIDEO_CDN_BASE: ${MOCK_VIDEO_CDN_BASE:-https://mock-cdn.example.com/videos}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run celery -A src.celery_app.celery_main:celery_app worker --loglevel=info --without-mingle --without-gossip

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8000

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  app_venv:
